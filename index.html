    <!-- ═══ Structured Data — FAQ (appears as rich result in Google search) ══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is MentorMuni?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MentorMuni is a free interview readiness platform for engineering students in India. It gives you a score across DSA, System Design, and HR readiness in ~5 minutes — with AI mock interviews, resume ATS checking, and mentor-backed prep to help you close the gaps before placement season."
          }
        },
        {
          "@type": "Question",
          "name": "Is the interview readiness check really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The interview readiness check is completely free, takes about 5 minutes, and requires no signup. You get an instant score with a topic-by-topic breakdown."
          }
        },
        {
          "@type": "Question",
          "name": "Which companies does MentorMuni prepare students for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MentorMuni covers company-specific patterns for TCS (NQT and Digital), Infosys (SP and DSP), Wipro (NLTH and Turbo), Cognizant (GenC and GenC Pro), Accenture (ASE and ASEL), HCL Technologies, Capgemini, and LTIMindtree."
          }
        },
        {
          "@type": "Question",
          "name": "What is an AI mock interview?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MentorMuni's AI mock interviews simulate real campus placement panels with real-time voice practice. You get feedback on clarity, depth, and structure — closer to a real interview than practicing alone."
          }
        },
        {
          "@type": "Question",
          "name": "Who are the mentors at MentorMuni?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MentorMuni mentors are senior engineers and tech leads from India's leading IT companies with 12–15 years of experience. They have each conducted 100+ interviews and are actively using AI tools like GitHub Copilot and ChatGPT in their daily work."
          }
        },
        {
          "@type": "Question",
          "name": "When should I start interview prep?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Start as early as possible. 2nd and 3rd year students can use the readiness check to align with what interviews actually test. 4th year students facing placement season should start immediately — most students who fail have no structured prep baseline going in."
          }
        }
      ]
    }
    </script>
