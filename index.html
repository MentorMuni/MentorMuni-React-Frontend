    {

        "@type": "ContactPoint",
        "telephone": "+91-91464-21302",
        "email": "enroll@mentormuni.com",
        "contactType": "customer support",
        "areaServed": "IN",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://www.linkedin.com/company/mentormuni",

    <!-- ═══ Structured Data — FAQ (appears as rich result in Google search) ══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is MentorMuni?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MentorMuni is an interview readiness platform for engineering students in India. You get a free scored check in about 5 minutes, a gap report, AI mock interviews, and mentor-backed prep for campus placements."
          }
        },
        {
          "@type": "Question",
          "name": "Is MentorMuni a placement mentor or coaching institute?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MentorMuni works like a placement mentor focused on performance: measure readiness first, name your gaps, then practise with mocks and industry mentors — structured prep for real campus and off-campus drives."
          }
        },
        {
          "@type": "Question",
          "name": "How do I prepare for campus placement interviews?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Start with a baseline readiness check, fix the highest-impact gaps (DSA, HR, aptitude, or role skills), then do timed mocks and mentor feedback before your drive season."
          }
        },
        {
          "@type": "Question",
          "name": "Is the interview readiness check free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The readiness check is free, takes about 5 minutes, and requires no signup. You receive an instant score with topic-level gaps."
          }
        },
        {
          "@type": "Question",
          "name": "Which companies does MentorMuni help with?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Students use MentorMuni for TCS, Infosys, Wipro, Cognizant, Accenture, Capgemini, and product company roles — aptitude, technical, and HR rounds typical in Indian campus drives."
          }
        },
        {
          "@type": "Question",
          "name": "When should I start placement preparation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ideally in 3rd year for aptitude and fundamentals; final-year students should start before drive season. A short readiness check early saves months of unfocused preparation."
          }
        }
      ]
    }
    </script>

    <!-- ═══ Structured Data — WebSite (enables Sitelinks search box) ══════ -->
