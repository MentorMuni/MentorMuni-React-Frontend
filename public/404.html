<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MentorMuni</title>
    <script type="text/javascript">
      var l = window.location;
      var parts = l.pathname.split('/').filter(function (p) { return p; });
      /* Custom domain (mentormuni.com) → 0; project site …/MentorMuni-React-Frontend/… → 1 */
      var pathSegmentsToKeep = parts[0] === 'MentorMuni-React-Frontend' ? 1 : 0;
      var base = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') || '';
      var route = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~');
      var query = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '/?/' + route + query + l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
